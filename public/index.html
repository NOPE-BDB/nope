<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOPE - 不岛币游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(77, 208, 225, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(77, 208, 225, 0.5); }
        .header {
            text-align: center;
            padding: 60px 20px 30px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }
        .header h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #00bcd4, #4dd0e1, #80deea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p { font-size: 1.1rem; color: #b0bec5; }
        .header-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .header-btn {
            background: rgba(0, 188, 212, 0.2);
            color: #4dd0e1;
            border: 1px solid rgba(0, 188, 212, 0.4);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .header-btn:hover {
            background: rgba(0, 188, 212, 0.4);
            transform: translateY(-2px);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 25px;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00bcd4, #7c4dff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .user-name { font-size: 0.9rem; color: #fff; }
        .user-dropdown { position: relative; }
        .dropdown-arrow { font-size: 0.7rem; color: #b0bec5; margin-left: 5px; transition: transform 0.3s; }
        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(13, 27, 42, 0.98);
            border-radius: 12px;
            min-width: 180px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1000;
            margin-top: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .dropdown-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: #e0e0e0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dropdown-item:hover {
            background: rgba(0, 188, 212, 0.2);
            color: #00bcd4;
        }
        .dropdown-item:first-child { border-radius: 12px 12px 0 0; }
        .dropdown-item:last-child { border-radius: 0 0 12px 12px; }
        .dropdown-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 5px 0;
        }
        .logout-item { color: #ff6b6b; }
        .logout-item:hover { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .admin-only { color: #ffd700; }
        .admin-only:hover { background: rgba(255, 215, 0, 0.2); color: #ffd700; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .section-title {
            font-size: 1.6rem;
            margin-bottom: 20px;
            padding-left: 15px;
            border-left: 4px solid #00bcd4;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 10px 0;
        }
        .game-card {
            background: rgba(50, 50, 50, 0.8);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .game-preview {
            height: 160px;
            background: linear-gradient(135deg, #006064 0%, #00838f 50%, #0097a7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .game-preview::before {
            content: '';
            position: absolute;
            width: 300%;
            height: 300%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            animation: wave 4s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { transform: translate(-30%, -30%) scale(1); }
            50% { transform: translate(-30%, -30%) scale(1.3); }
        }
        .game-icon { font-size: 4.5rem; z-index: 1; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .game-info { padding: 20px; }
        .game-title { font-size: 1.4rem; margin-bottom: 5px; color: #fff; }
        .game-author { color: #78909c; font-size: 0.85rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .follow-btn {
            background: rgba(76, 175, 80, 0.3);
            color: #81c784;
            border: 1px solid rgba(76, 175, 80, 0.5);
            padding: 3px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .follow-btn:hover { background: rgba(76, 175, 80, 0.5); }
        .follow-btn.following {
            background: rgba(100, 100, 100, 0.3);
            color: #9e9e9e;
            border-color: rgba(100, 100, 100, 0.5);
        }
        .follow-btn svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            transition: transform 0.3s ease;
        }
        .follow-btn.animating svg {
            animation: followSpin 0.4s ease;
        }
        @keyframes followSpin {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }
        .game-description { color: #b0bec5; font-size: 0.9rem; line-height: 1.5; margin-bottom: 12px; }
        .game-tags { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .tag {
            background: rgba(100, 100, 100, 0.4);
            color: #bbb;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            border: 1px solid rgba(0, 188, 212, 0.4);
        }
        .game-actions { display: flex; gap: 6px; justify-content: center; margin-bottom: 8px; flex-wrap: wrap; }
        .play-btn {
            display: inline-block;
            background: linear-gradient(135deg, #4a4a4a, #3a3a3a);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .play-btn:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); }
        .comment-btn {
            background: rgba(80, 80, 80, 0.5);
            color: #ccc;
            border: 1px solid rgba(156, 39, 176, 0.5);
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .comment-btn:hover { background: rgba(156, 39, 176, 0.5); }
        .favorite-btn {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.5);
            padding: 10px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .favorite-btn:hover { background: rgba(255, 193, 7, 0.4); transform: scale(1.1); }
        .favorite-btn.favorited { background: rgba(255, 193, 7, 0.5); }
        .game-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            color: #78909c;
        }
        .admin-badge {
            background: rgba(255, 193, 7, 0.3);
            color: #ffc107;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            margin-left: 5px;
        }
        .footer {
            text-align: center;
            padding: 30px 20px;
            background: rgba(0, 0, 0, 0.4);
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .footer p { color: #546e7a; font-size: 0.9rem; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
            border-radius: 20px;
            padding: 35px;
            max-width: 480px;
            width: 90%;
            border: 2px solid rgba(0, 188, 212, 0.3);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content.wide { max-width: 700px; background: rgba(13, 27, 42, 0.98); }
        .modal-title {
            font-size: 1.6rem;
            margin-bottom: 20px;
            text-align: center;
            color: #4dd0e1;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #b0bec5;
            transition: color 0.3s;
        }
        .close-btn:hover { color: #fff; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: #b0bec5; font-size: 0.9rem; }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid rgba(0, 188, 212, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group textarea:focus { outline: none; border-color: rgba(0, 188, 212, 0.6); }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00bcd4, #0097a7);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .submit-btn:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(0, 188, 212, 0.4); }
        .form-switch { text-align: center; margin-top: 15px; font-size: 0.9rem; color: #b0bec5; }
        .form-switch a { color: #4dd0e1; cursor: pointer; text-decoration: underline; }
        .empty-state { text-align: center; padding: 30px; color: #78909c; }
        .empty-state-icon { font-size: 3rem; margin-bottom: 10px; }
        .comments-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .comment-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .comment-author { font-weight: bold; color: #4dd0e1; font-size: 0.9rem; }
        .comment-time { font-size: 0.75rem; color: #78909c; }
        .comment-text { color: #b0bec5; font-size: 0.9rem; line-height: 1.5; }
        .comment-form { display: flex; gap: 10px; margin-top: 15px; }
        .comment-form input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid rgba(0, 188, 212, 0.3);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.9rem;
        }
        .comment-form input:focus { outline: none; border-color: rgba(0, 188, 212, 0.6); }
        .comment-form button {
            background: linear-gradient(135deg, #00bcd4, #0097a7);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            z-index: 2000;
            animation: slideDown 0.3s ease;
            background: #fff;
            color: #333;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            font-weight: 500;
        }
        .notification.error {
            background: rgba(244, 67, 54, 0.9);
            color: #fff;
        }
        .notification.success {
            background: rgba(76, 175, 80, 0.9);
            color: #fff;
        }
        .notification.info {
            background: rgba(33, 150, 243, 0.9);
            color: #fff;
        }
        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-100%); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 12px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #b0bec5;
        }
        .tab.active { background: rgba(0, 188, 212, 0.3); color: #4dd0e1; }
        .tab:hover:not(.active) { background: rgba(255, 255, 255, 0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 10px;
        }
        .user-item-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-item-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00bcd4, #7c4dff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .user-item-name {
            font-weight: bold;
            color: #fff;
        }
        .user-item-time {
            font-size: 0.75rem;
            color: #78909c;
        }
        .pending-card {
            background: rgba(255, 193, 7, 0.1);
            border: 2px solid rgba(255, 193, 7, 0.3);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
        }
        .pending-card h4 { color: #ffc107; margin-bottom: 8px; font-size: 1.1rem; }
        .pending-card p { color: #b0bec5; font-size: 0.85rem; margin-bottom: 10px; }
        .pending-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .approve-btn {
            background: rgba(76, 175, 80, 0.3);
            color: #81c784;
            border: 1px solid rgba(76, 175, 80, 0.5);
            padding: 8px 18px;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .approve-btn:hover { background: rgba(76, 175, 80, 0.5); }
        .reject-btn {
            background: rgba(244, 67, 54, 0.3);
            color: #ef5350;
            border: 1px solid rgba(244, 67, 54, 0.5);
            padding: 8px 18px;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .reject-btn:hover { background: rgba(244, 67, 54, 0.5); }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-buttons">
            <div id="authButtons">
                <button class="header-btn" onclick="openAuthModal('login')">登录</button>
                <button class="header-btn" onclick="openAuthModal('register')">注册</button>
            </div>
            <div id="userArea" style="display: none; gap: 15px;">
                <div class="user-dropdown">
                    <div class="user-info" onclick="toggleUserMenu()" style="cursor: pointer;">
                        <div class="user-avatar">👤</div>
                        <span class="user-name" id="displayUsername"></span>
                        <span class="dropdown-arrow">▼</span>
                    </div>
                    <div class="dropdown-menu" id="userDropdownMenu">
                        <div class="dropdown-item" onclick="openProfileModal()">个人主页</div>
                        <div class="dropdown-item" onclick="openMyGamesPage()">我的收藏</div>
                        <div class="dropdown-item" onclick="openGameManagePage()">我的游戏</div>
                        <div class="dropdown-item admin-only" id="adminModeBtn" onclick="openAdminModal()" style="display: none;">管理模式</div>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-item logout-item" onclick="logout()">退出登录</div>
                    </div>
                </div>
                <button class="header-btn" id="messageBtn" onclick="openMessageModal()" style="padding: 10px 14px; display: none;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </button>
            </div>
        </div>
        <h1>NOPE - 不岛币游戏</h1>
        <p>探索精彩游戏世界 | 欢迎上传你的作品</p>
    </header>

    <div class="container" id="homePage">
        <h2 class="section-title">游戏列表</h2>
        <div class="games-grid" id="gamesGrid"></div>
    </div>

    <footer class="footer">
        <p>© 2024 NOPE - 不岛币游戏 | 用 ❤️ 制作</p>
    </footer>

    <div class="modal" id="authModal">
        <div class="modal-content" style="background: rgba(13, 27, 42, 0.98);">
            <span class="close-btn" onclick="closeAuthModal()">&times;</span>
            <h3 class="modal-title" id="authTitle">登录</h3>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" required placeholder="输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" required placeholder="输入密码">
                </div>
                <button type="submit" class="submit-btn">登录</button>
                <p class="form-switch">没有账号？<a onclick="openAuthModal('register')">立即注册</a></p>
            </form>
            <form id="registerForm" style="display: none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUsername" required placeholder="3-20个字符，不可重复">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="regEmail" required placeholder="输入邮箱">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" required placeholder="至少6位，需包含字母和数字">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="regConfirm" required placeholder="再次输入密码">
                </div>
                <button type="submit" class="submit-btn">注册</button>
                <p class="form-switch">已有账号？<a onclick="openAuthModal('login')">立即登录</a></p>
            </form>
        </div>
    </div>

    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeUploadModal()">&times;</span>
            <h3 class="modal-title" id="uploadModalTitle">📤 上传新游戏</h3>
            <form id="uploadForm" onsubmit="submitGame(event)">
                <div class="form-group">
                    <label>游戏名称 *</label>
                    <input type="text" id="gameName" required placeholder="输入游戏名称">
                </div>
                <div class="form-group">
                    <label>游戏描述 *</label>
                    <textarea id="gameDesc" required placeholder="简要描述你的游戏"></textarea>
                </div>
                <div class="form-group">
                    <label>游戏简介</label>
                    <textarea id="gameIntro" placeholder="详细介绍游戏玩法、操作方式、特色等" style="min-height: 120px;"></textarea>
                </div>
                <div class="form-group">
                    <label>游戏链接 *</label>
                    <input type="text" id="gameUrl" required placeholder="游戏文件的相对路径">
                </div>
                <div class="form-group">
                    <label>游戏图标（emoji）</label>
                    <input type="text" id="gameIcon" placeholder="🎮" maxlength="2" style="width: 80px;">
                </div>
                <div class="form-group">
                    <label>游戏标签（用逗号分隔）</label>
                    <input type="text" id="gameTags" placeholder="如：休闲, HTML5, 动作">
                </div>
                <button type="submit" class="submit-btn">提交</button>
            </form>
        </div>
    </div>

    <div class="modal" id="commentModal">
        <div class="modal-content wide">
            <span class="close-btn" onclick="closeCommentModal()">&times;</span>
            <h3 class="modal-title" id="commentGameTitle">游戏评论</h3>
            <div class="comments-section" id="commentsList"></div>
            <div class="comment-form">
                <input type="text" id="commentInput" placeholder="写下你的评论或建议...">
                <button onclick="submitComment()">发送</button>
            </div>
        </div>
    </div>

    <div class="modal" id="profileModal">
        <div class="modal-content" style="max-width: 600px; background: rgba(13, 27, 42, 0.98);">
            <span class="close-btn" onclick="closeProfileModal()">&times;</span>
            <h3 class="modal-title">个人主页</h3>
            
            <div class="tabs" style="margin-bottom: 15px;">
                <div class="tab active" onclick="switchSettingsTab('following')">我的关注 (<span id="followingCountTab">0</span>)</div>
                <div class="tab" onclick="switchSettingsTab('followers')">我的粉丝 (<span id="followersCountTab">0</span>)</div>
            </div>
            
            <div id="followingTab" class="tab-content active">
                <div id="followingList" style="min-height: 400px;"></div>
            </div>
            
            <div id="followersTab" class="tab-content">
                <div id="followersList" style="min-height: 400px;"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="adminModal">
        <div class="modal-content wide">
            <span class="close-btn" onclick="closeAdminModal()">&times;</span>
            <h3 class="modal-title">管理员面板</h3>
            <div class="tabs">
                <div class="tab active" onclick="switchAdminTab('pending')">待审核</div>
                <div class="tab" onclick="switchAdminTab('games')">我的游戏</div>
                <div class="tab" onclick="switchAdminTab('users')">用户管理</div>
            </div>
            <div id="pendingTab" class="tab-content active">
                <div id="adminPendingList"></div>
            </div>
            <div id="gamesTab" class="tab-content">
                <div id="adminGamesList"></div>
            </div>
            <div id="usersTab" class="tab-content">
                <div id="usersList"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="myGamesModal">
        <div class="modal-content" style="background: rgba(13, 27, 42, 0.98); border-radius: 20px; padding: 30px; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: #fff;">我的收藏</h3>
                <span onclick="closeMyGamesModal()" style="cursor: pointer; font-size: 1.5rem; color: #b0bec5;">&times;</span>
            </div>
            <div id="myGamesContent"></div>
        </div>
    </div>

    <div class="modal" id="gameManageModal">
        <div class="modal-content" style="background: rgba(13, 27, 42, 0.98); border-radius: 20px; padding: 30px; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: #fff;">我的游戏</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button class="submit-btn" onclick="openUploadFromMyGames()" style="padding: 8px 16px; font-size: 0.85rem; width: auto;">📤 上传游戏</button>
                    <span onclick="closeGameManageModal()" style="cursor: pointer; font-size: 1.5rem; color: #b0bec5;">&times;</span>
                </div>
            </div>
            <div id="gameManageContent"></div>
        </div>
    </div>

    <div class="modal" id="messageModal">
        <div class="modal-content" style="background: rgba(13, 27, 42, 0.98); border-radius: 20px; padding: 30px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: #fff;">我的消息</h3>
                <span onclick="closeMessageModal()" style="cursor: pointer; font-size: 1.5rem; color: #b0bec5;">&times;</span>
            </div>
            <div id="messageList"></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let currentUser = null;
        let token = null;
        let games = [];
        let follows = [];
        let comments = {};
        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        let currentGameId = null;
        let messages = [];

        async function init() {
            console.log('init - 开始执行');
            
            token = localStorage.getItem('token');
            const userData = localStorage.getItem('currentUser');
            if (token && userData) {
                currentUser = JSON.parse(userData);
                updateUIForLoggedIn();
            }

            await fetchGames();
            
            if (currentUser) {
                await fetchFollows();
            }

            for (const game of games) {
                await fetchComments(game.id);
            }
            
            renderGames();
        }

        async function fetchGames() {
            try {
                const response = await fetch(`${API_URL}/api/games`);
                if (response.ok) {
                    games = await response.json();
                    console.log('从服务器获取游戏成功:', games.length, '个游戏');
                }
            } catch (error) {
                console.error('从服务器获取游戏失败:', error);
                showNotification('获取游戏列表失败', 'error');
            }
        }

        async function fetchFollows() {
            try {
                const response = await fetch(`${API_URL}/api/follows`);
                if (response.ok) {
                    follows = await response.json();
                    console.log('从服务器获取关注列表成功');
                }
            } catch (error) {
                console.error('从服务器获取关注列表失败:', error);
            }
        }

        async function fetchComments(gameId) {
            try {
                const response = await fetch(`${API_URL}/api/games/${gameId}/comments`);
                if (response.ok) {
                    comments[gameId] = await response.json();
                    return comments[gameId];
                }
            } catch (error) {
                console.error('从服务器获取评论失败:', error);
            }
            return [];
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    currentUser = data.user;
                    localStorage.setItem('token', token);
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    closeAuthModal();
                    showNotification('登录成功！', 'success');
                    updateUIForLoggedIn();
                    await fetchFollows();
                    renderGames();
                } else {
                    showNotification(data.error || '登录失败', 'error');
                }
            } catch (error) {
                showNotification('登录失败，请稍后重试', 'error');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            if (password !== confirm) {
                showNotification('两次密码不一致', 'error');
                return;
            }

            if (password.length < 6 || !/[a-zA-Z]/.test(password) || !/[0-9]/.test(password)) {
                showNotification('密码至少6位，需包含字母和数字', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email })
                });

                const data = await response.json();

                if (response.ok) {
                    showNotification('注册成功！请登录', 'success');
                    openAuthModal('login');
                } else {
                    showNotification(data.error || '注册失败', 'error');
                }
            } catch (error) {
                showNotification('注册失败，请稍后重试', 'error');
            }
        }

        function logout() {
            currentUser = null;
            token = null;
            localStorage.removeItem('token');
            localStorage.removeItem('currentUser');
            showNotification('已退出登录', 'info');
            updateUIForLoggedOut();
            renderGames();
        }

        function updateUIForLoggedIn() {
            document.getElementById('authButtons').style.display = 'none';
            document.getElementById('userArea').style.display = 'flex';
            document.getElementById('displayUsername').textContent = currentUser.username;
            document.getElementById('messageBtn').style.display = 'block';
            
            const adminModeBtn = document.getElementById('adminModeBtn');
            if (currentUser.isAdmin) {
                if (adminModeBtn) adminModeBtn.style.display = 'flex';
            } else {
                if (adminModeBtn) adminModeBtn.style.display = 'none';
            }
        }

        function updateUIForLoggedOut() {
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('userArea').style.display = 'none';
            document.getElementById('messageBtn').style.display = 'none';
        }

        function toggleUserMenu() {
            const menu = document.getElementById('userDropdownMenu');
            menu.classList.toggle('show');
        }

        document.addEventListener('click', function(e) {
            const dropdown = document.querySelector('.user-dropdown');
            const menu = document.getElementById('userDropdownMenu');
            if (dropdown && menu && !dropdown.contains(e.target)) {
                menu.classList.remove('show');
            }
        });

        function openAuthModal(type) {
            document.getElementById('authModal').classList.add('active');
            if (type === 'login') {
                document.getElementById('authTitle').textContent = '🔐 登录';
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else if (type === 'register') {
                document.getElementById('authTitle').textContent = '📝 注册';
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('active');
        }

        function handleUpload() {
            if (!currentUser) {
                showNotification('请先登录', 'error');
                openAuthModal('login');
                return;
            }
            document.getElementById('uploadModal').classList.add('active');
            document.getElementById('uploadModalTitle').textContent = '📤 上传新游戏';
            document.getElementById('uploadForm').reset();
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('active');
        }

        async function submitGame(e) {
            e.preventDefault();
            
            const name = document.getElementById('gameName').value;
            const description = document.getElementById('gameDesc').value;
            const intro = document.getElementById('gameIntro').value;
            const url = document.getElementById('gameUrl').value;
            const icon = document.getElementById('gameIcon').value || '🎮';
            const tags = document.getElementById('gameTags').value;

            try {
                const response = await fetch(`${API_URL}/api/games`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name, description, intro, url, icon, tags })
                });

                const data = await response.json();

                if (response.ok) {
                    closeUploadModal();
                    showNotification(data.message, 'success');
                    await fetchGames();
                    renderGames();
                } else {
                    showNotification(data.error || '上传失败', 'error');
                }
            } catch (error) {
                showNotification('上传失败，请稍后重试', 'error');
            }
        }

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            
            if (games.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎮</div><p>暂无游戏</p></div>`;
                return;
            }

            grid.innerHTML = games.map(game => {
                const isFollowing = currentUser && follows.some(f => f.followerid === currentUser.id && f.followingid === game.authorid);
                const canFollow = currentUser && game.authorid !== currentUser.id && !(currentUser.isAdmin && game.isadmingame);
                const followBtn = canFollow 
                    ? `<button class="follow-btn ${isFollowing ? 'following' : ''}" onclick="toggleFollow('${game.authorid}', '${game.author}', event)">${isFollowing ? '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>已关注' : '<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>关注'}</button>`
                    : '';

                const isFavorite = favorites.includes(game.id);
                const gameTags = game.tags ? (Array.isArray(game.tags) ? game.tags : game.tags.split(',')) : [];

                return `
                <div class="game-card">
                    <div class="game-preview">
                        <span class="game-icon">${game.icon}</span>
                    </div>
                    <div class="game-info">
                        <h3 class="game-title">${game.name}${game.isadmingame ? '<span class="admin-badge">官方</span>' : ''}</h3>
                        <p class="game-author">作者：${game.author} ${followBtn}</p>
                        <p class="game-description">${game.description}</p>
                        <div class="game-tags">
                            ${gameTags.map(tag => `<span class="tag">${tag.trim()}</span>`).join('')}
                        </div>
                        <div class="game-actions">
                            <a href="${game.url}" class="play-btn" target="_blank" onclick="incrementPlays('${game.id}')">▶ 开始</a>
                            <button class="comment-btn" onclick="openCommentModal('${game.id}')">${comments[game.id]?.length || 0}</button>
                            <button class="favorite-btn ${isFavorite ? 'favorited' : ''}" onclick="toggleFavorite('${game.id}')">${isFavorite ? '⭐' : '☆'}</button>
                        </div>
                        <div class="game-stats">
                            <span>${game.plays || 0} 次游玩</span>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        async function toggleFollow(followingId, followingName, event) {
            event.stopPropagation();
            if (!currentUser) {
                showNotification('请先登录', 'error');
                openAuthModal('login');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/follows`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ followingId, followingName })
                });

                const data = await response.json();

                if (response.ok) {
                    await fetchFollows();
                    if (data.action === 'followed') {
                        showNotification('关注成功', 'success');
                    } else {
                        showNotification('已取消关注', 'info');
                    }
                    renderGames();
                } else {
                    showNotification(data.error || '操作失败', 'error');
                }
            } catch (error) {
                showNotification('操作失败，请稍后重试', 'error');
            }
        }

        function toggleFavorite(gameId) {
            const index = favorites.indexOf(gameId);
            if (index === -1) {
                favorites.push(gameId);
                showNotification('已收藏', 'success');
            } else {
                favorites.splice(index, 1);
                showNotification('已取消收藏', 'info');
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            renderGames();
        }

        async function incrementPlays(gameId) {
            try {
                await fetch(`${API_URL}/api/games/${gameId}/play`, { method: 'POST' });
                const game = games.find(g => g.id === gameId);
                if (game) game.plays = (game.plays || 0) + 1;
            } catch (error) {
                console.error('更新游玩次数失败:', error);
            }
        }

        async function openCommentModal(gameId) {
            currentGameId = gameId;
            const game = games.find(g => g.id === gameId);
            
            document.getElementById('commentGameTitle').textContent = `${game.name} - 评论与建议`;
            await fetchComments(gameId);
            renderComments(gameId);
            document.getElementById('commentModal').classList.add('active');
        }

        function closeCommentModal() {
            document.getElementById('commentModal').classList.remove('active');
            document.getElementById('commentInput').value = '';
            currentGameId = null;
        }

        function renderComments(gameId) {
            const list = document.getElementById('commentsList');
            const gameComments = comments[gameId] || [];
            
            if (gameComments.length === 0) {
                list.innerHTML = `<div class="empty-state"><p>暂无评论，快来抢沙发吧！</p></div>`;
                return;
            }
            
            list.innerHTML = gameComments.map(c => `
                <div class="comment-item">
                    <div class="comment-header">
                        <span class="comment-author">${c.username}</span>
                        <span class="comment-time">${formatTime(c.createdat || c.createdAt)}</span>
                    </div>
                    <div class="comment-text">${c.content}</div>
                </div>
            `).join('');
        }

        async function submitComment() {
            if (!currentUser) {
                showNotification('请先登录', 'error');
                openAuthModal('login');
                return;
            }

            const input = document.getElementById('commentInput');
            const content = input.value.trim();
            if (!content) return;

            try {
                const response = await fetch(`${API_URL}/api/games/${currentGameId}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ content })
                });

                if (response.ok) {
                    await fetchComments(currentGameId);
                    renderComments(currentGameId);
                    input.value = '';
                    showNotification('评论成功！', 'success');
                    renderGames();
                } else {
                    showNotification('评论失败', 'error');
                }
            } catch (error) {
                showNotification('评论失败，请稍后重试', 'error');
            }
        }

        function openProfileModal() {
            if (!currentUser) return;
            document.getElementById('profileModal').classList.add('active');
            updateFollowCounts();
            renderFollowingList();
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.remove('active');
        }

        function switchSettingsTab(tab) {
            const profileModal = document.getElementById('profileModal');
            profileModal.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
            profileModal.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
            
            if (tab === 'following') renderFollowingList();
            if (tab === 'followers') renderFollowersList();
        }

        function updateFollowCounts() {
            if (!currentUser) return;
            const following = follows.filter(f => f.followerid === currentUser.id).length;
            const followers = follows.filter(f => f.followingid === currentUser.id).length;
            
            const followingCountTab = document.getElementById('followingCountTab');
            const followersCountTab = document.getElementById('followersCountTab');
            if (followingCountTab) followingCountTab.textContent = following;
            if (followersCountTab) followersCountTab.textContent = followers;
        }

        function renderFollowingList() {
            if (!currentUser) return;
            const following = follows.filter(f => f.followerid === currentUser.id);
            const list = document.getElementById('followingList');
            
            if (following.length === 0) {
                list.innerHTML = `<div class="empty-state"><p>暂无关注</p></div>`;
                return;
            }
            
            list.innerHTML = following.map(f => `
                <div class="user-item">
                    <div class="user-item-info">
                        <div class="user-item-avatar">👤</div>
                        <div>
                            <div class="user-item-name">${f.followingname || f.followingName}</div>
                            <div class="user-item-time">关注于 ${formatTime(f.createdat || f.createdAt)}</div>
                        </div>
                    </div>
                    <button class="follow-btn following" onclick="unfollowUser('${f.followingid || f.followingId}')">取消关注</button>
                </div>
            `).join('');
        }

        function renderFollowersList() {
            if (!currentUser) return;
            const followers = follows.filter(f => f.followingid === currentUser.id);
            const list = document.getElementById('followersList');
            
            if (followers.length === 0) {
                list.innerHTML = `<div class="empty-state"><p>暂无粉丝</p></div>`;
                return;
            }
            
            list.innerHTML = followers.map(f => `
                <div class="user-item">
                    <div class="user-item-info">
                        <div class="user-item-avatar">👤</div>
                        <div>
                            <div class="user-item-name">${f.followername || f.followerName}</div>
                            <div class="user-item-time">关注于 ${formatTime(f.createdat || f.createdAt)}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function unfollowUser(userId) {
            if (!currentUser) return;
            try {
                const response = await fetch(`${API_URL}/api/follows`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ followingId: userId, followingName: '' })
                });
                if (response.ok) {
                    await fetchFollows();
                    showNotification('已取消关注', 'info');
                    renderFollowingList();
                    updateFollowCounts();
                    renderGames();
                }
            } catch (error) {
                showNotification('操作失败', 'error');
            }
        }

        function openMyGamesPage() {
            document.getElementById('userDropdownMenu').classList.remove('show');
            showMyGamesModal();
        }

        function showMyGamesModal() {
            const favoriteGames = games.filter(g => favorites.includes(g.id));
            let html = '';
            
            if (favoriteGames.length === 0) {
                html += `<p style="color: #b0bec5; text-align: center;">暂无收藏的游戏</p>`;
            } else {
                favoriteGames.forEach(game => {
                    html += `
                    <div class="game-card" style="margin-bottom: 15px;">
                        <div class="game-info">
                            <h4 style="color: #fff;">${game.icon} ${game.name}</h4>
                            <p style="color: #b0bec5;">${game.description}</p>
                            <div style="margin-top: 10px;">
                                <a href="${game.url}" class="play-btn" target="_blank">▶ 开始</a>
                                <button class="reject-btn" onclick="removeFavorite('${game.id}')">取消收藏</button>
                            </div>
                        </div>
                    </div>
                    `;
                });
            }
            
            document.getElementById('myGamesContent').innerHTML = html;
            document.getElementById('myGamesModal').classList.add('active');
        }

        function closeMyGamesModal() {
            document.getElementById('myGamesModal').classList.remove('active');
        }

        function removeFavorite(gameId) {
            favorites = favorites.filter(id => id !== gameId);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            closeMyGamesModal();
            showMyGamesModal();
            showNotification('已取消收藏', 'info');
        }

        function openGameManagePage() {
            document.getElementById('userDropdownMenu').classList.remove('show');
            showGameManageModal();
        }

        function showGameManageModal() {
            if (!currentUser) return;
            
            const userGames = currentUser.isAdmin ? games : games.filter(g => g.authorid === currentUser.id);
            let html = '';
            
            if (userGames.length === 0) {
                html += `<p style="color: #b0bec5; text-align: center;">暂无上传的游戏</p>`;
            } else {
                userGames.forEach(game => {
                    const statusText = game.status === 'approved' ? '已发布' : (game.status === 'pending' ? '审核中' : '已拒绝');
                    const statusColor = game.status === 'approved' ? '#4caf50' : (game.status === 'pending' ? '#ff9800' : '#f44336');
                    
                    html += `
                    <div class="game-card" style="margin-bottom: 15px; padding: 20px;">
                        <div class="game-info">
                            <h4 style="color: #fff; margin-bottom: 10px;">${game.icon} ${game.name}</h4>
                            <p style="color: #b0bec5; margin-bottom: 5px;">${game.description}</p>
                            <p style="color: ${statusColor}; margin-bottom: 10px;">发布状态：${statusText}</p>
                            <p style="color: #b0bec5; margin-bottom: 10px;">游玩次数：${game.plays || 0}</p>
                        </div>
                    </div>
                    `;
                });
            }
            
            document.getElementById('gameManageContent').innerHTML = html;
            document.getElementById('gameManageModal').classList.add('active');
        }

        function closeGameManageModal() {
            document.getElementById('gameManageModal').classList.remove('active');
        }

        function openUploadFromMyGames() {
            closeGameManageModal();
            document.getElementById('uploadModal').classList.add('active');
            document.getElementById('uploadModalTitle').textContent = '📤 上传新游戏';
            document.getElementById('uploadForm').reset();
        }

        async function fetchMessages() {
            if (!currentUser || !token) return;
            try {
                const response = await fetch(`${API_URL}/api/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    messages = await response.json();
                }
            } catch (error) {
                console.error('获取消息失败:', error);
            }
        }

        async function openMessageModal() {
            if (!currentUser) {
                showNotification('请先登录', 'error');
                openAuthModal('login');
                return;
            }
            await fetchMessages();
            renderMessages();
            document.getElementById('messageModal').classList.add('active');
        }

        function closeMessageModal() {
            document.getElementById('messageModal').classList.remove('active');
        }

        function renderMessages() {
            const list = document.getElementById('messageList');
            if (messages.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>暂无消息</p></div>';
                return;
            }
            list.innerHTML = messages.map(m => `
                <div class="comment-item">
                    <div class="comment-header">
                        <span class="comment-author">${m.fromname || m.fromName}</span>
                        <span class="comment-time">${formatTime(m.createdat || m.createdAt)}</span>
                    </div>
                    <div class="comment-text">${m.content}</div>
                </div>
            `).join('');
        }

        function openAdminModal() {
            if (!currentUser || !currentUser.isAdmin) return;
            document.getElementById('adminModal').classList.add('active');
            renderAdminPending();
            renderAdminGames();
            renderUsers();
        }

        function closeAdminModal() {
            document.getElementById('adminModal').classList.remove('active');
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('#adminModal .tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('#adminModal .tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            event.target.classList.add('active');
        }

        async function renderAdminPending() {
            if (!currentUser || !currentUser.isAdmin) return;
            
            try {
                const response = await fetch(`${API_URL}/api/pending-games`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const pending = await response.json();
                    const list = document.getElementById('adminPendingList');
                    
                    if (pending.length === 0) {
                        list.innerHTML = `<div class="empty-state"><p>暂无待审核的游戏</p></div>`;
                        return;
                    }

                    list.innerHTML = pending.map(game => `
                        <div class="pending-card">
                            <h4>${game.icon} ${game.name}</h4>
                            <p><strong>作者：</strong>${game.author}</p>
                            <p><strong>描述：</strong>${game.description}</p>
                            <p><strong>链接：</strong>${game.url}</p>
                            <div class="pending-actions">
                                <a href="${game.url}" target="_blank" class="play-btn" style="padding: 8px 18px; font-size: 0.85rem;">试玩游戏</a>
                                <button class="approve-btn" onclick="approveGame('${game.id}')">✓ 批准</button>
                                <button class="reject-btn" onclick="rejectGame('${game.id}')">✗ 拒绝</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('获取待审核游戏失败:', error);
            }
        }

        async function approveGame(gameId) {
            try {
                const response = await fetch(`${API_URL}/api/games/${gameId}/approve`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    showNotification('游戏已批准！', 'success');
                    await fetchGames();
                    renderAdminPending();
                    renderAdminGames();
                    renderGames();
                } else {
                    showNotification('操作失败', 'error');
                }
            } catch (error) {
                showNotification('操作失败，请稍后重试', 'error');
            }
        }

        async function rejectGame(gameId) {
            try {
                const response = await fetch(`${API_URL}/api/games/${gameId}/reject`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    showNotification('游戏已拒绝', 'info');
                    await fetchGames();
                    renderAdminPending();
                    renderGames();
                } else {
                    showNotification('操作失败', 'error');
                }
            } catch (error) {
                showNotification('操作失败，请稍后重试', 'error');
            }
        }

        function renderAdminGames() {
            const list = document.getElementById('adminGamesList');
            
            if (games.length === 0) {
                list.innerHTML = `<div class="empty-state"><p>暂无游戏</p></div>`;
                return;
            }

            list.innerHTML = games.map(game => `
                <div class="pending-card">
                    <h4>${game.icon} ${game.name}</h4>
                    <p><strong>作者：</strong>${game.author}</p>
                    <p><strong>描述：</strong>${game.description}</p>
                    <p><strong>游玩次数：</strong>${game.plays || 0}</p>
                    <div class="pending-actions">
                        <a href="${game.url}" target="_blank" class="play-btn" style="padding: 6px 15px; font-size: 0.8rem;">试玩</a>
                    </div>
                </div>
            `).join('');
        }

        async function renderUsers() {
            if (!currentUser || !currentUser.isAdmin) return;
            
            try {
                const response = await fetch(`${API_URL}/api/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const users = await response.json();
                    const list = document.getElementById('usersList');
                    
                    list.innerHTML = users.map(u => `
                        <div class="user-item">
                            <div class="user-item-info">
                                <div class="user-item-avatar">${u.isadmin ? '👑' : '👤'}</div>
                                <div>
                                    <div class="user-item-name">${u.username}${u.isadmin ? '<span class="admin-badge">管理员</span>' : ''}</div>
                                    <div class="user-item-time">${u.email || '无邮箱'}</div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('获取用户列表失败:', error);
            }
        }

        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        init();
    </script>
</body>
</html>
